name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - "!**"

jobs:
  check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache Dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ matrix.node-version }}
          restore-keys: |
            ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ matrix.node-version }}

      - name: Setup project
        run: |
          npm ci --no-fund --no-audit --no-update-notifier --include=dev --include=optional

      - name: Check types
        run: npm run check:type

      - name: Run tests
        run: npm run test:ci
        env:
          CI: true

  publish-preview:
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Cache Dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-22.x
          restore-keys: |
            ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-22.x

      - name: Setup project
        run: |
          npm ci --no-fund --no-audit --no-update-notifier --include=dev --include=optional

      - name: Build
        run: npm run build

      - name: Publish to pkg.pr.new
        run: npx pkg-pr-new publish
